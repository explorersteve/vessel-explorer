service: vessel-discord-bot

primary_role: bot

image: <%= ENV["DOCKER_REGISTRY_USERNAME"] %>/vessel-discord-bot

servers:
  bot:
    hosts:
      - <%= ENV["DEPLOY_HOST"] %>
    proxy: false
    options:
      network: shared

registry:
  username: <%= ENV["DOCKER_REGISTRY_USERNAME"] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  context: ..
  dockerfile: ../Dockerfile.discord-bot

env:
  clear:
    INDEXER_URL: '<%= ENV["INDEXER_URL"] || "https://indexer.vessel.worldcomputer.art" %>'
    VESSEL_BASE_URL: '<%= ENV["VESSEL_BASE_URL"] || "https://vessel.worldcomputer.art" %>'
    ETH_RPC_URL: '<%= ENV["ETH_RPC_URL"] || "https://ethereum-rpc.publicnode.com" %>'
    POLL_INTERVAL_MS: '<%= ENV["POLL_INTERVAL_MS"] || "15000" %>'
    START_MODE: '<%= ENV["START_MODE"] || "latest" %>'
    STATE_FILE: '<%= ENV["STATE_FILE"] || "/data/state.json" %>'
    EXCLUDED_EVENT_TYPES: '<%= ENV["EXCLUDED_EVENT_TYPES"] || "transfer,metadata" %>'
    SEND_LATEST_ON_START: '<%= ENV["SEND_LATEST_ON_START"] || "true" %>'
    DAILY_SUMMARY_ENABLED: '<%= ENV["DAILY_SUMMARY_ENABLED"] || "true" %>'
    DAILY_SUMMARY_TIMEZONE: '<%= ENV["DAILY_SUMMARY_TIMEZONE"] || "America/New_York" %>'
    DAILY_SUMMARY_HOUR: '<%= ENV["DAILY_SUMMARY_HOUR"] || "15" %>'
    DAILY_SUMMARY_MINUTE: '<%= ENV["DAILY_SUMMARY_MINUTE"] || "0" %>'
    DAILY_SUMMARY_WINDOW_HOURS: '<%= ENV["DAILY_SUMMARY_WINDOW_HOURS"] || "24" %>'
    VESSEL_DEPLOYED_AT: '<%= ENV["VESSEL_DEPLOYED_AT"] || "2026-02-24T04:59:35.000Z" %>'
    DAILY_SUMMARY_SEND_LATEST_ON_START: '<%= ENV["DAILY_SUMMARY_SEND_LATEST_ON_START"] || "false" %>'
  secret:
    - DISCORD_WEBHOOK_URL

volumes:
  - /home/deploy/vessel-discord-bot/data:/data

ssh:
  user: deploy
